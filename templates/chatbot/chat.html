<!DOCTYPE html>
<html>
<head>
    <title>AI Mental Health Chatbot</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #7c6fcd;
            --primary-dark: #5f52b0;
            --primary-light: #ede9fe;
            --accent: #34d399;
            --accent-dark: #059669;
            --bg-page: #0f0e17;
            --bg-card: #1a1826;
            --bg-input: #221f33;
            --bg-bubble-bot: #1e2d3d;
            --bg-bubble-user: #2d1f4e;
            --border: rgba(255,255,255,0.08);
            --text-primary: #f0eeff;
            --text-secondary: #9990c0;
            --text-muted: #6b638f;
            --glow-purple: rgba(124,111,205,0.35);
            --glow-green: rgba(52,211,153,0.25);
            --danger: #f87171;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background orbs */
        body::before {
            content: '';
            position: fixed;
            top: -150px; left: -150px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,111,205,0.15) 0%, transparent 70%);
            pointer-events: none;
            animation: orb1 12s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(52,211,153,0.12) 0%, transparent 70%);
            pointer-events: none;
            animation: orb2 15s ease-in-out infinite alternate;
        }

        @keyframes orb1 { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,40px) scale(1.15); } }
        @keyframes orb2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-40px,-30px) scale(1.2); } }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.4;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main container */
        .wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .container {
            flex: 1;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 0 60px rgba(124,111,205,0.12), 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e1a30 0%, #251f3a 100%);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .header-icon {
            width: 46px; height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px var(--glow-purple);
            flex-shrink: 0;
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { box-shadow: 0 0 20px var(--glow-purple); }
            50% { box-shadow: 0 0 35px rgba(124,111,205,0.6); }
        }

        .header-text h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-dot {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--accent);
        }

        .status-dot::before {
            content: '';
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--glow-green);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Chatbox */
        .chatbox {
            height: 440px;
            overflow-y: auto;
            padding: 20px 18px;
            scroll-behavior: smooth;
        }

        .chatbox::-webkit-scrollbar { width: 4px; }
        .chatbox::-webkit-scrollbar-track { background: transparent; }
        .chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* Messages */
        .user, .bot {
            max-width: 82%;
            margin: 10px 0;
            padding: 13px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.55;
            word-wrap: break-word;
            animation: msg-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(14px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user {
            margin-left: auto;
            background: linear-gradient(135deg, #5f4da0, #7c6fcd);
            color: #fff;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(95,77,160,0.35);
        }

        .bot {
            margin-right: auto;
            background: var(--bg-bubble-bot);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.07);
            border-bottom-left-radius: 5px;
            position: relative;
        }

        .bot-avatar {
            display: inline-flex;
            width: 24px; height: 24px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            align-items: center; justify-content: center;
            font-size: 11px;
            margin-right: 8px;
            vertical-align: middle;
            flex-shrink: 0;
        }

        /* Typing bubble */
        .typing-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 13px 16px;
            background: var(--bg-bubble-bot);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            animation: msg-in 0.3s ease both;
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing-dot 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing-dot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 18px 18px;
            background: linear-gradient(to top, var(--bg-card) 80%, transparent);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(124,111,205,0.5);
            box-shadow: 0 0 0 3px rgba(124,111,205,0.12);
        }

        #msg {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14.5px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            caret-color: var(--primary);
        }

        #msg::placeholder { color: var(--text-muted); }

        #send-btn {
            width: 40px; height: 40px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 15px var(--glow-purple);
        }

        #send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(124,111,205,0.5); }
        #send-btn:active { transform: scale(0.95); }

        #send-btn svg { width: 18px; height: 18px; }

        .end-btn {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 14px;
            background: transparent;
            color: var(--danger);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.2px;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }

        .end-btn:hover { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.5); }
        .end-btn:active { transform: scale(0.98); }

        /* Meditation card */
        .meditation-card {
            background: linear-gradient(135deg, rgba(124,111,205,0.15), rgba(52,211,153,0.1));
            border: 1px solid rgba(124,111,205,0.25);
            border-radius: 16px;
            padding: 14px;
            margin-top: 6px;
        }

        .meditation-card img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            object-fit: cover;
        }

        .music-card { background: linear-gradient(135deg, rgba(52,211,153,0.12), rgba(96,165,250,0.1)); border: 1px solid rgba(52,211,153,0.2); border-radius: 16px; padding: 14px; margin-top: 6px; }
        .music-card audio { width: 100%; margin-top: 10px; filter: hue-rotate(200deg); }

        .tag {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(124,111,205,0.2);
            color: #a78bfa;
            letter-spacing: 0.3px;
        }

        /* Camera box */
        #camera-box {
            width: 200px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            flex-shrink: 0;
            animation: slide-in-right 0.5s ease both;
        }

        @keyframes slide-in-right {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .cam-header {
            padding: 12px 14px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        #video {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #0a0912;
            display: block;
        }

        .emotion-display {
            padding: 10px 14px 12px;
        }

        #emotion-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .emotion-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(124,111,205,0.3), rgba(52,211,153,0.2));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .emotion-bar {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .emotion-fill {
            height: 100%;
            width: 60%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 1s ease;
            animation: shimmer 2s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* Quick prompts */
        .quick-prompts {
            padding: 0 18px 14px;
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 5px 11px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(124,111,205,0.15);
            border-color: rgba(124,111,205,0.4);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* Crisis alert */
        .crisis-banner {
            margin: 10px 18px;
            padding: 10px 14px;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 12px;
            font-size: 12.5px;
            color: #fca5a5;
            display: none;
            animation: msg-in 0.3s ease both;
        }

        /* Responsive */
        @media (max-width: 650px) {
            .wrapper { flex-direction: column; }
            #camera-box { width: 100%; position: static; }
            .chatbox { height: 340px; }
        }
    </style>
</head>
<body>

<!-- Floating particles -->
<script>
(function(){
    const colors = ['#7c6fcd','#a78bfa','#34d399','#60a5fa'];
    for(let i = 0; i < 18; i++){
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random()*4+2;
        p.style.cssText = `
            width:${size}px;height:${size}px;
            left:${Math.random()*100}vw;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            animation-duration:${Math.random()*18+12}s;
            animation-delay:${Math.random()*10}s;
            opacity:${Math.random()*0.3+0.1};
        `;
        document.body.appendChild(p);
    }
})();
</script>

<div class="wrapper">

    <!-- Main Chat Panel -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🧠</div>
            <div class="header-text">
                <h1>MindfulAI Companion</h1>
                <p>Safe space to talk • Always here for you</p>
            </div>
            <div class="status-dot">Online</div>
        </div>

        <!-- Chat messages -->
        <div id="chatbox" class="chatbox">
            <div class="bot" style="animation-delay:0.1s">
                Hello 👋 I am your AI companion. Tell me how you're feeling, or ask me for movies, songs, meditation, or support.
            </div>
        </div>

        <!-- Quick prompts -->
        <div class="quick-prompts">
            <button class="quick-btn" onclick="quickSend('I feel stressed today')">😓 Stressed</button>
            <button class="quick-btn" onclick="quickSend('I need meditation help')">🧘 Meditate</button>
            <button class="quick-btn" onclick="quickSend('Play a calming song')">🎵 Calm music</button>
            <button class="quick-btn" onclick="quickSend('I feel lonely')">💙 Lonely</button>
            <button class="quick-btn" onclick="quickSend('I need support')">🤝 Support</button>
        </div>

        <!-- Crisis resource banner (shown if needed) -->
        <div class="crisis-banner" id="crisis-banner">
            🆘 If you're in crisis, call <strong>iCall: 9152987821</strong> or reach out to a trusted person.
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="msg" placeholder="Share what's on your mind…" autocomplete="off">
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <button class="end-btn" onclick="endChatManually()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                End Session & Generate Report
            </button>
        </div>
    </div>

    <!-- Camera Panel -->
    <div id="camera-box">
        <div class="cam-header">Emotion Detect</div>
        <video id="video" autoplay muted playsinline></video>
        <div class="emotion-display">
            <div id="emotion-label">
                <div class="emotion-icon" id="emotion-icon">😐</div>
                <span id="emotion-text">Neutral</span>
            </div>
            <div class="emotion-bar"><div class="emotion-fill" id="emotion-fill"></div></div>
        </div>
    </div>

</div>

<script>
let faceEmotion = "neutral";

const emotionEmojis = {
    joy: "😊", sadness: "😢", anger: "😠", fear: "😨",
    disgust: "😞", surprise: "😲", neutral: "😐"
};

function addMessage(text, type) {
    const chatbox = document.getElementById("chatbox");
    const msg = document.createElement("div");
    msg.className = type;

    if (text.includes("youtube.com") || text.includes("youtu.be")) {
        msg.innerHTML = `<p>${text}</p><iframe width="100%" height="180" src="${text.replace("watch?v=", "embed/")}" frameborder="0" allowfullscreen style="border-radius:10px;margin-top:8px"></iframe>`;
    } else {
        msg.innerText = text;
    }

    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;

    // Show crisis banner for high-risk keywords
    const risk = ['suicid','self-harm','hurt myself','want to die','end my life','worthless'];
    if (risk.some(w => text.toLowerCase().includes(w))) {
        document.getElementById('crisis-banner').style.display = 'block';
    }
}

function addHtmlMessage(html, type) {
    const chatbox = document.getElementById("chatbox");
    const msg = document.createElement("div");
    msg.className = type;
    msg.innerHTML = html;
    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function addTypingBubble() {
    const chatbox = document.getElementById("chatbox");
    const msg = document.createElement("div");
    msg.innerHTML = `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
    return msg;
}

function removeElement(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
}

// Mood → YouTube meditation video map
const meditationVideos = {
    sadness:    "https://www.youtube.com/embed/inpok4MKVLM",
    anger:      "https://www.youtube.com/embed/1ZYbU82GVz4",
    fear:       "https://www.youtube.com/embed/O-6f5wQXSu8",
    nervousness:"https://www.youtube.com/embed/O-6f5wQXSu8",
    neutral:    "https://www.youtube.com/embed/ZToicYcHIOU",
    joy:        "https://www.youtube.com/embed/ZToicYcHIOU",
    default:    "https://www.youtube.com/embed/inpok4MKVLM"
};

// Pool of free meditation images (Unsplash — no auth needed)
const meditationImages = [
    "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=600&q=80",  // person meditating sunrise
    "https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=600&q=80",  // yoga on beach
    "https://images.unsplash.com/photo-1593811167562-9cef47bfc4d7?w=600&q=80",  // calm forest meditation
    "https://images.unsplash.com/photo-1528319725582-ddc096101511?w=600&q=80",  // peaceful zen stones
    "https://images.unsplash.com/photo-1470116945706-e6bf5d5a53ca?w=600&q=80",  // candles calm
    "https://images.unsplash.com/photo-1499209974431-9dddcece7f88?w=600&q=80",  // hands meditation
    "https://images.unsplash.com/photo-1532798442725-41036acc7489?w=600&q=80",  // lotus pose
    "https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?w=600&q=80",  // sunset meditation
    "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=600&q=80",  // peaceful nature
    "https://images.unsplash.com/photo-1508672019048-805c876b67e2?w=600&q=80",  // calm water reflection
];

function addMeditationVideo() {
    const videoUrl = meditationVideos[faceEmotion] || meditationVideos.default;

    // Pick 2 random images from the pool (no repeats)
    const shuffled = meditationImages.sort(() => 0.5 - Math.random());
    const picked = shuffled.slice(0, 2);

    addHtmlMessage(`
        <div class="meditation-card">
            <div style="font-size:14px;font-weight:600;color:#c4b5fd;margin-bottom:10px">
                🧘 Guided meditation for you
            </div>

            <!-- Random meditation images -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
                <img
                    src="${picked[0]}"
                    alt="Meditation"
                    style="width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.08)"
                    onerror="this.style.display='none'"
                >
                <img
                    src="${picked[1]}"
                    alt="Meditation"
                    style="width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.08)"
                    onerror="this.style.display='none'"
                >
            </div>

            <!-- YouTube video -->
            <iframe
                width="100%"
                height="200"
                src="${videoUrl}?autoplay=0"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                style="border-radius:12px;display:block">
            </iframe>
            <div class="tag">🎯 Picked based on your mood</div>
        </div>
    `, "bot");
}

// Mood → YouTube music map
const moodMusic = {
    sadness:    { url: "https://www.youtube.com/embed/4N3N1MlvVc4", label: "Healing & Uplifting Music" },
    anger:      { url: "https://www.youtube.com/embed/1ZYbU82GVz4", label: "Calm Down Music" },
    fear:       { url: "https://www.youtube.com/embed/lFcSrYw-ARY", label: "Peaceful Anxiety Relief" },
    nervousness:{ url: "https://www.youtube.com/embed/lFcSrYw-ARY", label: "Peaceful Anxiety Relief" },
    joy:        { url: "https://www.youtube.com/embed/ZbZSe6N_BXs", label: "Happy Vibes Music" },
    neutral:    { url: "https://www.youtube.com/embed/2OEL4P1Rz04", label: "Relaxing Lo-fi Music" },
    default:    { url: "https://www.youtube.com/embed/2OEL4P1Rz04", label: "Relaxing Lo-fi Music" }
};

function addSongPlayer() {
    const mood = moodMusic[faceEmotion] || moodMusic.default;
    addHtmlMessage(`
        <div class="music-card">
            <div style="font-size:14px;font-weight:600;color:#6ee7b7;margin-bottom:10px">
                🎵 ${mood.label}
            </div>
            <iframe
                width="100%"
                height="200"
                src="${mood.url}?autoplay=0"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                style="border-radius:12px;display:block">
            </iframe>
            <div class="tag">🎭 Matched to your detected mood: ${faceEmotion}</div>
        </div>
    `, "bot");
}

function quickSend(text) {
    document.getElementById('msg').value = text;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById("msg");
    const message = input.value.trim();
    if (message === "") return;

    addMessage(message, "user");
    input.value = "";

    const lowerMessage = message.toLowerCase();
    const typingBubble = addTypingBubble();

    try {
        const response = await fetch("/chatbot/chat/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, emotion: faceEmotion })
        });

        const data = await response.json();
        removeElement(typingBubble);
        addMessage(data.reply, "bot");

       // After getting the reply, show meditation video
if (lowerMessage.includes("meditation") || lowerMessage.includes("not well") ||
    lowerMessage.includes("stressed") || lowerMessage.includes("anxious") ||
    lowerMessage.includes("panic") || lowerMessage.includes("calm") ||
    lowerMessage.includes("miss someone") || lowerMessage.includes("lonely")) {
    addMeditationVideo();   // ← renamed from addMeditationImage
}

if (lowerMessage.includes("song") || lowerMessage.includes("music") ||
    lowerMessage.includes("play") || lowerMessage.includes("not well") ||
    lowerMessage.includes("sad") || lowerMessage.includes("lonely")) {
    addSongPlayer();
}

        if (data.end_chat === true) {
            setTimeout(() => {
                alert("High mental health risk detected. Report generated.");
                window.location.href = "/profile/";
            }, 1200);
            return;
        }

        if (lowerMessage.includes("bye") || lowerMessage.includes("goodbye") ||
            lowerMessage.includes("end chat") || lowerMessage.includes("see you")) {
            setTimeout(() => { window.location.href = "/"; }, 1800);
        }

    } catch (error) {
        removeElement(typingBubble);
        addMessage("Something went wrong. Please try again.", "bot");
        console.log("Chat error:", error);
    }

    if (message.toLowerCase().includes("bye") || message.toLowerCase().includes("goodbye")) {
        alert("Chat ended. Generating report...");
        window.location.href = "/profile/";
    }
}

async function endChatManually() {
    try {
        const response = await fetch("/end-chat/", { method: "POST" });
        const data = await response.json();
        alert(data.report || "Chat ended.");
        window.location.href = "/";
    } catch (error) {
        console.log("End chat error:", error);
        alert("Could not end chat properly.");
    }
}

async function loadFaceModels() {
    await faceapi.nets.tinyFaceDetector.loadFromUri("/static/models");
    await faceapi.nets.faceExpressionNet.loadFromUri("/static/models");
}

async function startCamera() {
    const video = document.getElementById("video");
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();
    } catch (err) { console.log("Camera error:", err); }
}

function mapFaceApiEmotion(emotion) {
    const mapping = { happy: "joy", sad: "sadness", angry: "anger", fearful: "fear", disgusted: "disgust", surprised: "surprise", neutral: "neutral" };
    return mapping[emotion] || "neutral";
}

function detectFaceLoop() {
    const video = document.getElementById("video");
    setInterval(async () => {
        try {
            if (video.readyState < 2) return;
            const detection = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceExpressions();

            if (detection && detection.expressions) {
                let maxEmotion = "neutral", maxValue = 0;
                for (const key in detection.expressions) {
                    if (detection.expressions[key] > maxValue) {
                        maxValue = detection.expressions[key];
                        maxEmotion = key;
                    }
                }
                faceEmotion = mapFaceApiEmotion(maxEmotion);
                document.getElementById("emotion-icon").textContent = emotionEmojis[faceEmotion] || "😐";
                document.getElementById("emotion-text").textContent = faceEmotion.charAt(0).toUpperCase() + faceEmotion.slice(1);
                document.getElementById("emotion-fill").style.width = Math.round(maxValue * 100) + "%";
            } else {
                document.getElementById("emotion-text").textContent = "No face";
                document.getElementById("emotion-icon").textContent = "👤";
            }
        } catch (error) { console.log("Face detection error:", error); }
    }, 1500);
}

document.addEventListener("DOMContentLoaded", async function () {
    document.getElementById("msg").addEventListener("keypress", function (e) {
        if (e.key === "Enter") sendMessage();
    });
    try {
        await loadFaceModels();
        await startCamera();
        detectFaceLoop();
    } catch (e) {
        console.log("Startup error:", e);
        document.getElementById("emotion-text").textContent = "Model failed";
    }
});
</script>
