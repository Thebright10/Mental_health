{% extends "base.html" %}
{% block content %}

<div style="min-height:85vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">

  <div style="width:100%;max-width:480px;" data-aos="fade-up">

    <!-- Card -->
    <div style="background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);
      border-radius:28px;padding:50px 44px;
      border:1px solid rgba(255,255,255,0.95);
      box-shadow:0 20px 60px rgba(91,164,207,0.18),0 4px 20px rgba(0,0,0,0.06);">

      <!-- Icon & heading -->
      <div style="text-align:center;margin-bottom:34px;">
        <div style="width:72px;height:72px;border-radius:50%;
          background:linear-gradient(135deg,#5ba4cf,#9b59b6);
          display:flex;align-items:center;justify-content:center;
          font-size:30px;margin:0 auto 18px;
          box-shadow:0 8px 25px rgba(91,164,207,0.4);">🧠</div>
        <h2 style="font-weight:800;font-size:28px;color:#2d3748;margin-bottom:6px;">Welcome Back</h2>
        <p style="color:#a0aec0;font-size:15px;">Your safe space is waiting for you</p>
      </div>

      <!-- Error alert -->
      {% if error %}
      <div style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);
        border-radius:12px;padding:14px 18px;margin-bottom:22px;
        color:#c0392b;font-size:14px;font-weight:600;">
        ⚠️ {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:18px;">
          <label style="font-size:13px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:8px;">
            Username
          </label>
          <div style="position:relative;">
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;">👤</span>
            <input type="text" name="username" required
              style="width:100%;padding:14px 16px 14px 44px;border-radius:14px;font-size:15px;
                border:1.5px solid rgba(91,164,207,0.25);background:rgba(240,247,255,0.7);
                color:#2d3748;outline:none;transition:all 0.3s;font-family:'Nunito',sans-serif;"
              placeholder="Enter your username"
              onfocus="this.style.borderColor='#5ba4cf';this.style.background='white';this.style.boxShadow='0 0 0 3px rgba(91,164,207,0.15)'"
              onblur="this.style.borderColor='rgba(91,164,207,0.25)';this.style.background='rgba(240,247,255,0.7)';this.style.boxShadow='none'">
          </div>
        </div>

        <div style="margin-bottom:26px;">
          <label style="font-size:13px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:8px;">
            Password
          </label>
          <div style="position:relative;">
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;">🔒</span>
            <input type="password" name="password" required
              style="width:100%;padding:14px 16px 14px 44px;border-radius:14px;font-size:15px;
                border:1.5px solid rgba(91,164,207,0.25);background:rgba(240,247,255,0.7);
                color:#2d3748;outline:none;transition:all 0.3s;font-family:'Nunito',sans-serif;"
              placeholder="Enter your password"
              onfocus="this.style.borderColor='#5ba4cf';this.style.background='white';this.style.boxShadow='0 0 0 3px rgba(91,164,207,0.15)'"
              onblur="this.style.borderColor='rgba(91,164,207,0.25)';this.style.background='rgba(240,247,255,0.7)';this.style.boxShadow='none'">
          </div>
        </div>

        <button type="submit"
          style="width:100%;padding:16px;border:none;border-radius:50px;
            background:linear-gradient(135deg,#5ba4cf,#9b59b6);color:white;
            font-weight:700;font-size:16px;cursor:pointer;transition:all 0.3s;
            box-shadow:0 8px 25px rgba(91,164,207,0.4);font-family:'Nunito',sans-serif;"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 12px 35px rgba(91,164,207,0.5)'"
          onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 8px 25px rgba(91,164,207,0.4)'">
          ✨ Sign In
        </button>
      </form>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:16px;margin:26px 0;">
        <div style="flex:1;height:1px;background:rgba(91,164,207,0.2);"></div>
        <span style="font-size:13px;color:#a0aec0;">New here?</span>
        <div style="flex:1;height:1px;background:rgba(91,164,207,0.2);"></div>
      </div>

      <a href="{% url 'register' %}"
        style="display:block;width:100%;padding:14px;border-radius:50px;text-align:center;
          border:2px solid rgba(91,164,207,0.4);color:#5ba4cf;font-weight:700;font-size:15px;
          text-decoration:none;transition:all 0.3s;background:transparent;"
        onmouseover="this.style.background='rgba(91,164,207,0.08)';this.style.borderColor='#5ba4cf'"
        onmouseout="this.style.background='transparent';this.style.borderColor='rgba(91,164,207,0.4)'">
        Create Account →
      </a>

      <!-- Affirmation -->
      <p style="text-align:center;margin-top:24px;font-size:13px;color:#a0aec0;font-style:italic;">
        💙 "Every journey to wellness begins with a single step."
      </p>

    </div>
  </div>
</div>

{% endblock %}
